<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="1200" height="600" fill="#0b0e14"/>
  <rect x="0" y="0" width="1200" height="4" fill="#4fd1c5"/>
  <text x="60" y="58" font-size="26" font-weight="800" fill="#e7ebf2">Constraint-violation rate after compaction</text>
  <text x="60" y="90" font-size="17" fill="#8891a3">Measured across 1,323 episodes and 7 model families — arXiv:2606.22528, “Governance Decay”</text>

  <!-- bars: track from x=360 to x=1120 (760px = 100%) -->
  <g font-family="Helvetica Neue, Arial, sans-serif">
    <!-- row 1: 0% -->
    <text x="330" y="176" text-anchor="end" font-size="19" fill="#c3cad6">policy in full context</text>
    <rect x="360" y="150" width="760" height="40" rx="8" fill="#0e1320" stroke="#232c3d"/>
    <rect x="360" y="150" width="8" height="40" rx="4" fill="#34d399"/>
    <text x="384" y="178" font-family="Menlo,monospace" font-size="24" font-weight="800" fill="#34d399">0%</text>

    <!-- row 2: 30% -->
    <text x="330" y="256" text-anchor="end" font-size="19" fill="#c3cad6">after compaction — average</text>
    <rect x="360" y="230" width="760" height="40" rx="8" fill="#0e1320" stroke="#232c3d"/>
    <rect x="360" y="230" width="228" height="40" rx="8" fill="#fbbf24"/>
    <text x="606" y="258" font-family="Menlo,monospace" font-size="24" font-weight="800" fill="#fbbf24">30%</text>

    <!-- row 3: 59% -->
    <text x="330" y="336" text-anchor="end" font-size="19" fill="#c3cad6">after compaction — worst model</text>
    <rect x="360" y="310" width="760" height="40" rx="8" fill="#0e1320" stroke="#232c3d"/>
    <rect x="360" y="310" width="448" height="40" rx="8" fill="#fb7185"/>
    <text x="826" y="338" font-family="Menlo,monospace" font-size="24" font-weight="800" fill="#fb7185">59%</text>
  </g>

  <!-- survives / dropped split -->
  <g transform="translate(360,420)">
    <rect width="368" height="120" rx="14" fill="#0f1a1c" stroke="#2b5c56"/>
    <text x="28" y="46" font-size="17" fill="#8891a3">rule <tspan fill="#34d399" font-weight="700">survives</tspan> the summary</text>
    <text x="28" y="92" font-family="Menlo,monospace" font-size="40" font-weight="800" fill="#34d399">0%</text>
    <text x="150" y="92" font-size="16" fill="#5a6273">violations</text>
  </g>
  <g transform="translate(752,420)">
    <rect width="368" height="120" rx="14" fill="#1a0f12" stroke="#7a2c38"/>
    <text x="28" y="46" font-size="17" fill="#8891a3">rule is <tspan fill="#fb7185" font-weight="700">dropped</tspan></text>
    <text x="28" y="92" font-family="Menlo,monospace" font-size="40" font-weight="800" fill="#fb7185">38%</text>
    <text x="150" y="92" font-size="16" fill="#5a6273">violations</text>
  </g>
</svg>
