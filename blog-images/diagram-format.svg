<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="1200" height="560" fill="#0b0e14"/>
  <rect x="0" y="0" width="1200" height="4" fill="#4fd1c5"/>
  <text x="60" y="58" font-size="26" font-weight="800" fill="#e7ebf2">The constraint format — an explicit opt-in</text>
  <text x="60" y="90" font-size="17" fill="#8891a3">One fenced block. False-positive rate near zero, because nothing outside it counts.</text>

  <!-- left: fenced block -->
  <g transform="translate(60,130)">
    <rect width="560" height="300" rx="16" fill="#121724" stroke="#232c3d"/>
    <text x="26" y="44" font-family="Menlo,monospace" font-size="19" fill="#5a6273">```constraints</text>
    <text x="26" y="88" font-family="Menlo,monospace" font-size="19" fill="#cdd3dc"><tspan fill="#fb7185">must</tspan>: never delete production data</text>
    <text x="26" y="132" font-family="Menlo,monospace" font-size="19" fill="#cdd3dc"><tspan fill="#fb7185">must</tspan> <tspan fill="#4fd1c5">[signoff]</tspan>: sign-off before schema</text>
    <text x="26" y="176" font-family="Menlo,monospace" font-size="19" fill="#cdd3dc"><tspan fill="#fbbf24">should</tspan>: cite a source for every claim</text>
    <text x="26" y="220" font-family="Menlo,monospace" font-size="19" fill="#5a6273">```</text>
    <!-- annotations -->
    <text x="26" y="266" font-size="14" fill="#8891a3"><tspan fill="#fb7185" font-weight="700">must</tspan> / <tspan fill="#fbbf24" font-weight="700">should</tspan> = severity &nbsp;·&nbsp; <tspan fill="#4fd1c5" font-weight="700">[id]</tspan> = optional</text>
  </g>

  <!-- arrow -->
  <g transform="translate(650,280)">
    <line x1="0" y1="0" x2="90" y2="0" stroke="#4fd1c5" stroke-width="2"/>
    <path d="M90 0 l-14 -8 l0 16 z" fill="#4fd1c5"/>
    <text x="45" y="-16" text-anchor="middle" font-family="Menlo,monospace" font-size="14" fill="#4fd1c5">cg extract</text>
  </g>

  <!-- right: JSON -->
  <g transform="translate(770,130)">
    <rect width="370" height="300" rx="16" fill="#0f1a1c" stroke="#2b5c56"/>
    <text x="24" y="42" font-family="Menlo,monospace" font-size="16" fill="#cdd3dc">[</text>
    <text x="40" y="72" font-family="Menlo,monospace" font-size="15" fill="#8891a3">{ <tspan fill="#4fd1c5">id</tspan>: "never-delete-…",</text>
    <text x="56" y="98" font-family="Menlo,monospace" font-size="15" fill="#8891a3"><tspan fill="#4fd1c5">text</tspan>: "never delete…",</text>
    <text x="56" y="124" font-family="Menlo,monospace" font-size="15" fill="#8891a3"><tspan fill="#4fd1c5">severity</tspan>: "<tspan fill="#fb7185">must</tspan>" },</text>
    <text x="40" y="158" font-family="Menlo,monospace" font-size="15" fill="#8891a3">{ <tspan fill="#4fd1c5">id</tspan>: "signoff",</text>
    <text x="56" y="184" font-family="Menlo,monospace" font-size="15" fill="#8891a3"><tspan fill="#4fd1c5">severity</tspan>: "<tspan fill="#fb7185">must</tspan>" },</text>
    <text x="40" y="218" font-family="Menlo,monospace" font-size="15" fill="#8891a3">{ … "<tspan fill="#fbbf24">should</tspan>" }</text>
    <text x="24" y="248" font-family="Menlo,monospace" font-size="16" fill="#cdd3dc">]</text>
    <text x="24" y="284" font-size="14" fill="#34d399" font-weight="700">✓ validated, harness-neutral JSON</text>
  </g>
</svg>
