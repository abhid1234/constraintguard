<svg width="1200" height="540" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="1200" height="540" fill="#0b0e14"/>
  <rect x="0" y="0" width="1200" height="4" fill="#4fd1c5"/>
  <text x="60" y="58" font-size="26" font-weight="800" fill="#e7ebf2">How constraintguard closes the loop</text>

  <!-- timeline -->
  <line x1="90" y1="250" x2="1110" y2="250" stroke="#232c3d" stroke-width="2"/>

  <!-- node: extract (before) -->
  <g transform="translate(90,180)">
    <rect width="230" height="140" rx="16" fill="#121724" stroke="#2b5c56"/>
    <text x="24" y="42" font-family="Menlo,monospace" font-size="20" font-weight="700" fill="#4fd1c5">cg extract</text>
    <text x="24" y="76" font-size="15" fill="#c3cad6">pull declared rules</text>
    <text x="24" y="100" font-size="15" fill="#c3cad6">out of the session</text>
    <text x="24" y="124" font-size="13" fill="#5a6273">— before compaction</text>
  </g>
  <circle cx="90" cy="250" r="7" fill="#4fd1c5"/>

  <!-- COMPACTION event -->
  <g transform="translate(400,196)">
    <rect width="180" height="108" rx="14" fill="#1a140f" stroke="#7a5a2c"/>
    <text x="90" y="44" text-anchor="middle" font-family="Menlo,monospace" font-size="17" font-weight="700" fill="#fbbf24">COMPACTION</text>
    <text x="90" y="74" text-anchor="middle" font-size="14" fill="#8891a3">context summarized</text>
  </g>
  <circle cx="490" cy="250" r="7" fill="#fbbf24"/>

  <!-- node: pin (after) -->
  <g transform="translate(650,180)">
    <rect width="230" height="140" rx="16" fill="#121724" stroke="#2b7a5e"/>
    <text x="24" y="42" font-family="Menlo,monospace" font-size="20" font-weight="700" fill="#34d399">cg pin</text>
    <text x="24" y="76" font-size="15" fill="#c3cad6">re-inject the rules</text>
    <text x="24" y="100" font-size="15" fill="#c3cad6">into fresh context</text>
    <text x="24" y="124" font-size="13" fill="#5a6273">— round-trip guaranteed</text>
  </g>
  <circle cx="650" cy="250" r="7" fill="#34d399"/>

  <!-- node: conformance -->
  <g transform="translate(960,180)">
    <rect width="150" height="140" rx="16" fill="#121724" stroke="#232c3d"/>
    <text x="20" y="42" font-family="Menlo,monospace" font-size="17" font-weight="700" fill="#e7ebf2">cg</text>
    <text x="20" y="64" font-family="Menlo,monospace" font-size="17" font-weight="700" fill="#e7ebf2">conformance</text>
    <text x="20" y="98" font-size="14" fill="#c3cad6">measure how</text>
    <text x="20" y="118" font-size="14" fill="#c3cad6">many survived</text>
  </g>
  <circle cx="1035" cy="250" r="7" fill="#e7ebf2"/>

  <!-- bottom labels -->
  <text x="90" y="360" font-size="16" fill="#34d399" font-weight="700">✓ the rules survive the summary</text>
  <text x="90" y="392" font-size="16" fill="#8891a3">— and a Claude Code / Codex / Cursor adapter + a drop-in hook make it automatic.</text>
  <text x="90" y="452" font-family="Menlo,monospace" font-size="18" fill="#4fd1c5">$ npx @avee1234/constraintguard</text>
</svg>
